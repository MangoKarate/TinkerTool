<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" href="TinkerTool.ico" />
<title>TinkerTool — Wiring Visualizer</title>
<style>
  :root {
    --chrome:        #171c28;
    --chrome-2:      #1e2536;
    --chrome-3:      #262f45;
    --line:          #313c56;
    --ink:           #e8ecf5;
    --ink-mut:       #8b96b0;
    --ink-dim:       #5a637d;
    --accent:        #e0873c;
    --accent-hi:     #f2983f;
    --accent-dim:    #7a5326;
    --pad:           #cfae6b;
    --mat:           #f7f6f1;
    --grid:          #e4e6de;
    --grid-strong:   #d2d6c9;
    --danger:        #d95c5c;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    --sans: "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: var(--sans);
    background: var(--chrome);
    color: var(--ink);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  .app { display: grid; grid-template-columns: 1fr 340px; grid-template-rows: auto 1fr; height: 100vh; }

  /* ---- Toolbar ---- */
  .toolbar {
    grid-column: 1 / -1;
    display: flex; align-items: center; gap: 18px;
    padding: 10px 18px;
    background: linear-gradient(180deg, var(--chrome-2), var(--chrome));
    border-bottom: 1px solid var(--line);
    z-index: 10;
  }
  .brand { display: flex; align-items: baseline; gap: 10px; }
  .brand .mark {
    font-family: var(--mono); font-weight: 700; letter-spacing: .08em;
    font-size: 15px; color: var(--accent);
  }
  .brand .sub { font-size: 11px; color: var(--ink-mut); letter-spacing: .14em; text-transform: uppercase; }
  .brand .ver {
    font-family: var(--mono); font-size: 10px; color: var(--accent);
    border: 1px solid var(--accent-dim); border-radius: 5px; padding: 2px 5px; letter-spacing: .03em;
  }

  .tb-group { display: flex; align-items: center; gap: 6px; }
  .tb-sep { width: 1px; height: 22px; background: var(--line); }
  .spacer { flex: 1; }

  button, .btn {
    font-family: var(--sans); font-size: 12.5px; font-weight: 500;
    color: var(--ink); background: var(--chrome-3);
    border: 1px solid var(--line); border-radius: 7px;
    padding: 7px 11px; cursor: pointer; line-height: 1;
    transition: background .12s, border-color .12s, transform .06s;
  }
  button:hover, .btn:hover { background: #2e3a55; border-color: #3f4d6e; }
  button:active { transform: translateY(1px); }
  button.primary { background: var(--accent); border-color: var(--accent-hi); color: #201405; font-weight: 600; }
  button.primary:hover { background: var(--accent-hi); }
  button.ghost { background: transparent; }
  button.tiny { padding: 4px 7px; font-size: 11px; border-radius: 5px; }
  button.danger { color: var(--danger); }
  button.danger:hover { background: rgba(217,92,92,.12); border-color: var(--danger); }

  .zoomval { font-family: var(--mono); font-size: 11.5px; color: var(--ink-mut); width: 42px; text-align: center; }

  /* ---- Canvas ---- */
  .stage { position: relative; overflow: hidden; background: var(--mat); }
  svg#board { width: 100%; height: 100%; display: block; cursor: grab; touch-action: none; }
  svg#board.panning { cursor: grabbing; }

  .hint {
    position: absolute; left: 16px; bottom: 14px;
    font-size: 11.5px; color: #9a9a8e; background: rgba(255,255,255,.7);
    border: 1px solid #e0e0d5; border-radius: 8px; padding: 8px 11px;
    max-width: 340px; line-height: 1.5; backdrop-filter: blur(4px);
    pointer-events: none;
  }
  .hint b { color: #6b6b5c; font-weight: 600; }
  .arm-banner {
    position: absolute; left: 50%; top: 14px; transform: translateX(-50%);
    font-family: var(--mono); font-size: 12px; color: #201405;
    background: var(--accent); border-radius: 20px; padding: 7px 15px;
    box-shadow: 0 4px 16px rgba(0,0,0,.18); display: none; align-items: center; gap: 8px;
  }
  .arm-banner.show { display: flex; }
  .arm-dot { width: 9px; height: 9px; border-radius: 50%; background: #201405; }

  /* ---- Side panel ---- */
  .panel {
    background: var(--chrome-2); border-left: 1px solid var(--line);
    overflow-y: auto; padding: 0 0 40px;
  }
  .panel::-webkit-scrollbar { width: 10px; }
  .panel::-webkit-scrollbar-thumb { background: #2e384f; border-radius: 6px; border: 2px solid var(--chrome-2); }

  .section { border-bottom: 1px solid var(--line); padding: 16px 16px; }
  .section h2 {
    font-size: 10.5px; letter-spacing: .16em; text-transform: uppercase;
    color: var(--ink-mut); margin: 0 0 12px; font-weight: 600;
  }
  .row { display: flex; gap: 8px; align-items: center; }
  .row + .row { margin-top: 8px; }
  label.fld { display: flex; flex-direction: column; gap: 4px; flex: 1; }
  label.fld span { font-size: 10.5px; color: var(--ink-mut); letter-spacing: .04em; }
  input[type="text"], input[type="number"], select {
    font-family: var(--sans); font-size: 12.5px; color: var(--ink);
    background: var(--chrome); border: 1px solid var(--line); border-radius: 6px;
    padding: 7px 9px; width: 100%;
  }
  input:focus, select:focus { outline: none; border-color: var(--accent); }
  input[type="number"] { font-family: var(--mono); }

  .empty { font-size: 12px; color: var(--ink-dim); font-style: italic; padding: 4px 0; }

  /* component list */
  .comp-item {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 9px; border: 1px solid var(--line); border-radius: 7px;
    margin-bottom: 6px; cursor: pointer; background: var(--chrome);
    transition: border-color .12s, background .12s;
  }
  .comp-item:hover { border-color: #3f4d6e; }
  .comp-item.sel { border-color: var(--accent); background: rgba(224,135,60,.08); }
  .comp-item .cname { font-family: var(--mono); font-size: 12.5px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .comp-item .cpins { font-size: 10.5px; color: var(--ink-mut); font-family: var(--mono); }

  /* pin editor */
  .pin-row {
    display: grid; grid-template-columns: 1fr 74px 26px; gap: 6px; align-items: center;
    margin-bottom: 6px;
  }
  .pin-row .pin-mono { font-family: var(--mono); font-size: 12px; }
  .pin-conns { margin: 2px 0 10px; padding-left: 2px; }
  .conn-chip {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--mono); font-size: 10.5px; color: var(--ink);
    background: var(--chrome-3); border: 1px solid var(--line);
    border-radius: 20px; padding: 3px 5px 3px 9px; margin: 3px 4px 0 0;
  }
  .conn-chip .swatch { width: 10px; height: 10px; border-radius: 50%; border: 1px solid rgba(0,0,0,.3); }
  .conn-chip button { padding: 1px 5px; font-size: 11px; line-height: 1; border-radius: 10px; }

  /* wire color swatches */
  .swatches { display: flex; flex-wrap: wrap; gap: 7px; align-items: center; }
  .sw {
    width: 26px; height: 26px; border-radius: 7px; cursor: pointer;
    border: 2px solid transparent; box-shadow: inset 0 0 0 1px rgba(0,0,0,.25);
    position: relative;
  }
  .sw.active { border-color: var(--ink); box-shadow: inset 0 0 0 1px rgba(0,0,0,.25), 0 0 0 2px var(--accent); }
  .sw-custom { display: flex; align-items: center; justify-content: center; }
  input[type="color"] { width: 26px; height: 26px; padding: 0; border: none; background: none; cursor: pointer; }
  input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
  input[type="color"]::-webkit-color-swatch { border: 1px solid var(--line); border-radius: 6px; }

  /* wires list */
  .wire-item {
    display: flex; align-items: center; gap: 9px;
    padding: 7px 8px; border-radius: 6px; margin-bottom: 5px; background: var(--chrome);
    border: 1px solid var(--line); font-family: var(--mono); font-size: 11px;
  }
  .wire-item .swatch { width: 14px; height: 14px; border-radius: 4px; flex-shrink: 0; border: 1px solid rgba(0,0,0,.35); }
  .wire-item .wlabel { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--ink-mut); }

  .hidden-file { display: none; }

  /* Parts library modal */
  .lib-backdrop { position: fixed; inset: 0; background: rgba(6,9,14,.62); display: none; align-items: center; justify-content: center; z-index: 60; padding: 24px; }
  .lib-backdrop.show { display: flex; }
  .lib-modal { background: var(--chrome-2); border: 1px solid var(--line); border-radius: 14px; width: 660px; max-width: 100%; max-height: 82vh; display: flex; flex-direction: column; box-shadow: 0 24px 64px rgba(0,0,0,.5); }
  .lib-head { display: flex; align-items: center; justify-content: space-between; padding: 15px 18px; border-bottom: 1px solid var(--line); }
  .lib-head h3 { margin: 0; font-size: 13.5px; letter-spacing: .02em; font-weight: 600; }
  .lib-head .close { background: transparent; border: none; color: var(--ink-mut); font-size: 16px; cursor: pointer; padding: 4px 9px; border-radius: 6px; }
  .lib-head .close:hover { background: var(--chrome-3); color: var(--ink); }
  .lib-body { padding: 12px 18px 20px; overflow-y: auto; }
  .lib-cat { font-size: 10.5px; letter-spacing: .16em; text-transform: uppercase; color: var(--ink-mut); font-weight: 600; margin: 16px 0 9px; }
  .lib-cat:first-child { margin-top: 4px; }
  .lib-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 9px; }
  .lib-card { background: var(--chrome); border: 1px solid var(--line); border-radius: 9px; padding: 11px 12px; cursor: pointer; transition: border-color .12s, background .12s, transform .06s; }
  .lib-card:hover { border-color: var(--accent); background: rgba(224,135,60,.07); }
  .lib-card:active { transform: translateY(1px); }
  .lib-card .cn { font-family: var(--mono); font-size: 12.5px; color: var(--ink); }
  .lib-card .cd { font-size: 10.5px; color: var(--ink-mut); margin-top: 3px; }
</style>
</head>
<body>
<div class="app">
  <!-- Toolbar -->
  <div class="toolbar">
    <div class="brand">
      <span class="mark">◈ TinkerTool</span>
      <span class="sub">wiring visualizer</span>
      <span class="ver" id="verTag">v1.2</span>
    </div>
    <div class="tb-sep"></div>
    <div class="tb-group">
      <button class="primary" id="addComp">+ Component</button>
      <button id="addNote">✎ Note</button>
      <button id="addLib">⊞ Parts</button>
    </div>
    <div class="spacer"></div>
    <div class="tb-group">
      <button id="zoomOut" class="tiny">−</button>
      <span class="zoomval" id="zoomVal">100%</span>
      <button id="zoomIn" class="tiny">+</button>
      <button id="zoomFit" class="ghost tiny">Fit</button>
    </div>
    <div class="tb-sep"></div>
    <label class="row" style="gap:6px; font-size:12px; color:var(--ink-mut); cursor:pointer;">
      <input type="checkbox" id="snap" checked style="width:auto;"> Snap
    </label>
    <div class="tb-sep"></div>
    <div class="tb-group">
      <button id="reportBtn" class="ghost">Report</button>
      <button id="saveBtn" class="ghost">Save</button>
      <button id="loadBtn" class="ghost">Load</button>
      <button id="clearBtn" class="ghost danger">Clear</button>
    </div>
    <input type="file" id="fileInput" accept="application/json" class="hidden-file">
  </div>

  <!-- Canvas -->
  <div class="stage">
    <svg id="board" xmlns="http://www.w3.org/2000/svg">
      <g id="world">
        <rect id="mat" x="-6000" y="-6000" width="12000" height="12000" fill="url(#gridPat)"></rect>
        <g id="wireLayer"></g>
        <g id="compLayer"></g>
        <g id="noteLayer"></g>
      </g>
      <defs>
        <pattern id="gridPat" width="24" height="24" patternUnits="userSpaceOnUse">
          <rect width="24" height="24" fill="var(--mat)"></rect>
          <path d="M24 0H0V24" fill="none" stroke="var(--grid)" stroke-width="1"></path>
        </pattern>
      </defs>
    </svg>
    <div class="arm-banner" id="armBanner"><span class="arm-dot"></span><span id="armText"></span></div>
    <div class="hint" id="hint">
      <b>Drag</b> a component to move it · <b>Click a pin</b> then another to wire them ·
      <b>Drag empty space</b> to pan · <b>Scroll</b> to zoom
    </div>
  </div>

  <!-- Side panel -->
  <div class="panel">
    <div class="section">
      <h2>Wire color</h2>
      <div class="swatches" id="swatches"></div>
    </div>

    <div class="section">
      <h2>Components</h2>
      <div id="compList"><div class="empty">No components yet. Add one to start.</div></div>
    </div>

    <div class="section" id="editorSection" style="display:none;">
      <h2 id="editorTitle">Edit component</h2>
      <div id="editor"></div>
    </div>

    <div class="section" id="noteSection" style="display:none;">
      <h2>Edit note</h2>
      <div id="noteEditor"></div>
    </div>

    <div class="section">
      <h2>Wires</h2>
      <div id="wireList"><div class="empty">No connections yet.</div></div>
    </div>
  </div>
</div>

<script>
"use strict";

// ---------- State ----------
const state = {
  components: [],   // {id, x, y, w, h, label, pins:[{id,name,side}]}
  wires: [],        // {id, from, to, color}   (from/to = pinId)
  notes: [],        // {id, x, y, w, text}
  selected: null,   // component id
  selectedNote: null,
  armedPin: null,   // pinId
  color: "#d94141",
  view: { x: 220, y: 140, scale: 1 },
  seq: 1
};
const uid = (p) => p + (state.seq++);

const WIRE_COLORS = [
  ["Red", "#d94141"], ["Black", "#22262e"], ["Yellow", "#e5c53a"],
  ["Green", "#3fae5a"], ["Blue", "#3d7fd9"], ["Orange", "#e08a3c"],
  ["White", "#f2f2ee"], ["Purple", "#9b5cd0"], ["Brown", "#8a5a3c"], ["Gray", "#8a94a0"]
];

// ---------- DOM refs ----------
const svg = document.getElementById("board");
const world = document.getElementById("world");
const compLayer = document.getElementById("compLayer");
const wireLayer = document.getElementById("wireLayer");
const noteLayer = document.getElementById("noteLayer");
const SVGNS = "http://www.w3.org/2000/svg";

// ---------- Geometry ----------
function pinPos(comp, pin) {
  const side = comp.pins.filter(p => p.side === pin.side);
  const idx = side.indexOf(pin);
  const frac = (idx + 1) / (side.length + 1);
  switch (pin.side) {
    case "top":    return { x: comp.x + comp.w * frac, y: comp.y };
    case "bottom": return { x: comp.x + comp.w * frac, y: comp.y + comp.h };
    case "left":   return { x: comp.x,                 y: comp.y + comp.h * frac };
    case "right":  return { x: comp.x + comp.w,        y: comp.y + comp.h * frac };
  }
}
const SIDE_NORMAL = { top: [0, -1], bottom: [0, 1], left: [-1, 0], right: [1, 0] };

function findPin(pinId) {
  for (const c of state.components) {
    const p = c.pins.find(p => p.id === pinId);
    if (p) return { comp: c, pin: p };
  }
  return null;
}

function wirePath(a, b, aSide, bSide) {
  const na = SIDE_NORMAL[aSide], nb = SIDE_NORMAL[bSide];
  const dist = Math.hypot(b.x - a.x, b.y - a.y);
  const off = Math.min(Math.max(dist * 0.4, 36), 150);
  const c1 = { x: a.x + na[0] * off, y: a.y + na[1] * off };
  const c2 = { x: b.x + nb[0] * off, y: b.y + nb[1] * off };
  return `M ${a.x} ${a.y} C ${c1.x} ${c1.y}, ${c2.x} ${c2.y}, ${b.x} ${b.y}`;
}

// ---------- Coordinate conversion ----------
function toWorld(clientX, clientY) {
  const r = svg.getBoundingClientRect();
  return {
    x: (clientX - r.left - state.view.x) / state.view.scale,
    y: (clientY - r.top - state.view.y) / state.view.scale
  };
}
function applyView() {
  const v = state.view;
  world.setAttribute("transform", `translate(${v.x} ${v.y}) scale(${v.scale})`);
  document.getElementById("zoomVal").textContent = Math.round(v.scale * 100) + "%";
}
function snap(v) {
  return document.getElementById("snap").checked ? Math.round(v / 24) * 24 : v;
}

// ---------- Render: canvas ----------
function renderBoard() {
  // wires
  wireLayer.innerHTML = "";
  for (const w of state.wires) {
    const a = findPin(w.from), b = findPin(w.to);
    if (!a || !b) continue;
    const pa = pinPos(a.comp, a.pin), pb = pinPos(b.comp, b.pin);
    const d = wirePath(pa, pb, a.pin.side, b.pin.side);
    const shadow = document.createElementNS(SVGNS, "path");
    shadow.setAttribute("d", d);
    shadow.setAttribute("fill", "none");
    shadow.setAttribute("stroke", "rgba(0,0,0,.15)");
    shadow.setAttribute("stroke-width", "5.5");
    shadow.setAttribute("stroke-linecap", "round");
    shadow.setAttribute("transform", "translate(0.5 1.5)");
    wireLayer.appendChild(shadow);
    const path = document.createElementNS(SVGNS, "path");
    path.setAttribute("d", d);
    path.setAttribute("fill", "none");
    path.setAttribute("stroke", w.color);
    path.setAttribute("stroke-width", "3.5");
    path.setAttribute("stroke-linecap", "round");
    path.dataset.wire = w.id;
    path.style.cursor = "pointer";
    wireLayer.appendChild(path);
    // highlight sheen
    const sheen = document.createElementNS(SVGNS, "path");
    sheen.setAttribute("d", d);
    sheen.setAttribute("fill", "none");
    sheen.setAttribute("stroke", "rgba(255,255,255,.28)");
    sheen.setAttribute("stroke-width", "1");
    sheen.setAttribute("stroke-linecap", "round");
    sheen.setAttribute("pointer-events", "none");
    sheen.setAttribute("transform", "translate(0 -1)");
    wireLayer.appendChild(sheen);
  }

  // components
  compLayer.innerHTML = "";
  for (const c of state.components) {
    const g = document.createElementNS(SVGNS, "g");
    g.dataset.comp = c.id;

    const body = document.createElementNS(SVGNS, "rect");
    body.setAttribute("x", c.x); body.setAttribute("y", c.y);
    body.setAttribute("width", c.w); body.setAttribute("height", c.h);
    body.setAttribute("rx", "8");
    body.setAttribute("fill", c.id === state.selected ? "#20604f" : "#1f3b4d");
    body.setAttribute("stroke", c.id === state.selected ? "var(--accent)" : "#2c5468");
    body.setAttribute("stroke-width", c.id === state.selected ? "2" : "1.5");
    body.style.cursor = "grab";
    body.dataset.body = c.id;
    g.appendChild(body);

    // subtle board texture line
    const tex = document.createElementNS(SVGNS, "rect");
    tex.setAttribute("x", c.x + 5); tex.setAttribute("y", c.y + 5);
    tex.setAttribute("width", Math.max(0, c.w - 10)); tex.setAttribute("height", Math.max(0, c.h - 10));
    tex.setAttribute("rx", "5"); tex.setAttribute("fill", "none");
    tex.setAttribute("stroke", "rgba(255,255,255,.06)"); tex.setAttribute("pointer-events", "none");
    g.appendChild(tex);

    const label = document.createElementNS(SVGNS, "text");
    label.setAttribute("x", c.x + c.w / 2); label.setAttribute("y", c.y + c.h / 2);
    label.setAttribute("text-anchor", "middle"); label.setAttribute("dominant-baseline", "middle");
    label.setAttribute("fill", "#cfe0e8"); label.setAttribute("font-size", "13");
    label.setAttribute("font-family", "var(--mono)"); label.setAttribute("font-weight", "600");
    label.setAttribute("pointer-events", "none");
    label.textContent = c.label;
    g.appendChild(label);

    // pins
    for (const p of c.pins) {
      const pos = pinPos(c, p);
      const isArmed = state.armedPin === p.id;

      const hit = document.createElementNS(SVGNS, "circle");
      hit.setAttribute("cx", pos.x); hit.setAttribute("cy", pos.y); hit.setAttribute("r", "11");
      hit.setAttribute("fill", "transparent"); hit.dataset.pin = p.id;
      hit.style.cursor = "crosshair";
      g.appendChild(hit);

      const pad = document.createElementNS(SVGNS, "circle");
      pad.setAttribute("cx", pos.x); pad.setAttribute("cy", pos.y);
      pad.setAttribute("r", isArmed ? "7" : "5.5");
      pad.setAttribute("fill", isArmed ? "var(--accent)" : "#dcb968");
      pad.setAttribute("stroke", "#14202a"); pad.setAttribute("stroke-width", "1.5");
      pad.setAttribute("pointer-events", "none");
      g.appendChild(pad);

      const hole = document.createElementNS(SVGNS, "circle");
      hole.setAttribute("cx", pos.x); hole.setAttribute("cy", pos.y); hole.setAttribute("r", "1.8");
      hole.setAttribute("fill", "#14202a"); hole.setAttribute("pointer-events", "none");
      g.appendChild(hole);

      // pin name
      const t = document.createElementNS(SVGNS, "text");
      const nudge = 13;
      let tx = pos.x, ty = pos.y, anchor = "middle";
      if (p.side === "left")  { tx = pos.x + nudge; anchor = "start"; }
      if (p.side === "right") { tx = pos.x - nudge; anchor = "end"; }
      if (p.side === "top")   { ty = pos.y + 13; }
      if (p.side === "bottom"){ ty = pos.y - 9; }
      t.setAttribute("x", tx); t.setAttribute("y", ty);
      t.setAttribute("text-anchor", anchor); t.setAttribute("dominant-baseline", "middle");
      t.setAttribute("fill", "#9fb6c0"); t.setAttribute("font-size", "9.5");
      t.setAttribute("font-family", "var(--mono)"); t.setAttribute("pointer-events", "none");
      t.textContent = p.name;
      g.appendChild(t);
    }
    compLayer.appendChild(g);
  }

  renderNotes();
}

// ---------- Notes ----------
const NOTE_PAD = 10, NOTE_LH = 14, NOTE_FS = 11.5, NOTE_TAIL = 12;

function wrapNote(text, wPx) {
  const maxChars = Math.max(8, Math.floor((wPx - NOTE_PAD * 2) / (NOTE_FS * 0.55)));
  const out = [];
  for (const para of String(text == null ? "" : text).split("\n")) {
    if (!para.trim()) { out.push(""); continue; }
    let line = "";
    for (const word of para.trim().split(/\s+/)) {
      const t = line ? line + " " + word : word;
      if (t.length > maxChars && line) { out.push(line); line = word; } else { line = t; }
    }
    if (line) out.push(line);
  }
  return out.length ? out : [""];
}
function noteHeight(n) {
  return Math.max(34, wrapNote(n.text, n.w).length * NOTE_LH + NOTE_PAD * 2);
}

function renderNotes() {
  noteLayer.innerHTML = "";
  for (const n of state.notes) {
    const lines = wrapNote(n.text, n.w);
    const h = noteHeight(n);
    const sel = n.id === state.selectedNote;
    const edge = sel ? "var(--accent)" : "#c3ab72";
    const g = document.createElementNS(SVGNS, "g");
    g.dataset.note = n.id;

    const box = document.createElementNS(SVGNS, "rect");
    box.setAttribute("x", n.x); box.setAttribute("y", n.y);
    box.setAttribute("width", n.w); box.setAttribute("height", h);
    box.setAttribute("rx", "10");
    box.setAttribute("fill", "#fdf3d7");
    box.setAttribute("stroke", edge);
    box.setAttribute("stroke-width", sel ? "2" : "1.2");
    box.style.cursor = "grab";
    box.dataset.noteBody = n.id;
    g.appendChild(box);

    // tail: fill first (hides the box's bottom stroke), then the two slanted edges only
    const tx = n.x + 20, ty = n.y + h;
    const tailFill = document.createElementNS(SVGNS, "path");
    tailFill.setAttribute("d", `M${tx} ${ty - 2} L${tx} ${ty + NOTE_TAIL} L${tx + 15} ${ty - 2} Z`);
    tailFill.setAttribute("fill", "#fdf3d7");
    tailFill.setAttribute("pointer-events", "none");
    g.appendChild(tailFill);
    const tailEdge = document.createElementNS(SVGNS, "path");
    tailEdge.setAttribute("d", `M${tx} ${ty} L${tx} ${ty + NOTE_TAIL} L${tx + 15} ${ty}`);
    tailEdge.setAttribute("fill", "none");
    tailEdge.setAttribute("stroke", edge);
    tailEdge.setAttribute("stroke-width", sel ? "2" : "1.2");
    tailEdge.setAttribute("stroke-linejoin", "round");
    tailEdge.setAttribute("pointer-events", "none");
    g.appendChild(tailEdge);

    const t = document.createElementNS(SVGNS, "text");
    t.setAttribute("y", n.y + NOTE_PAD + 9);
    t.setAttribute("fill", "#4a4128");
    t.setAttribute("font-size", NOTE_FS);
    t.setAttribute("font-family", "var(--sans)");
    t.setAttribute("pointer-events", "none");
    lines.forEach((ln, i) => {
      const ts = document.createElementNS(SVGNS, "tspan");
      ts.setAttribute("x", n.x + NOTE_PAD);
      ts.setAttribute("dy", i === 0 ? 0 : NOTE_LH);
      ts.textContent = ln === "" ? " " : ln;
      t.appendChild(ts);
    });
    g.appendChild(t);
    noteLayer.appendChild(g);
  }
}

// ---------- helpers ----------
function field(labelText, type, value, onInput, grow) {
  const l = document.createElement("label"); l.className = "fld"; if (!grow) l.style.flex = "1";
  const s = document.createElement("span"); s.textContent = labelText;
  const i = document.createElement("input"); i.type = type; i.value = value;
  i.oninput = () => onInput(i.value);
  l.appendChild(s); l.appendChild(i);
  return l;
}
const clampNum = (v, lo, hi) => Math.min(hi, Math.max(lo, Number(v) || lo));

function wireExists(a, b) {
  return state.wires.some(w => (w.from === a && w.to === b) || (w.from === b && w.to === a));
}
function addWire(a, b) {
  if (a === b || wireExists(a, b)) return;
  state.wires.push({ id: uid("w"), from: a, to: b, color: state.color });
  renderAll();
}
function deleteWire(id) { state.wires = state.wires.filter(w => w.id !== id); renderAll(); }
function deletePin(c, pinId) {
  c.pins = c.pins.filter(p => p.id !== pinId);
  state.wires = state.wires.filter(w => w.from !== pinId && w.to !== pinId);
  if (state.armedPin === pinId) state.armedPin = null;
  renderAll();
}
function deleteComponent(id) {
  const c = state.components.find(c => c.id === id); if (!c) return;
  const pinIds = new Set(c.pins.map(p => p.id));
  state.wires = state.wires.filter(w => !pinIds.has(w.from) && !pinIds.has(w.to));
  state.components = state.components.filter(c => c.id !== id);
  if (state.selected === id) state.selected = null;
  if (state.armedPin && pinIds.has(state.armedPin)) state.armedPin = null;
  renderAll();
}

function renderAll() { renderBoard(); renderPanel(); renderNoteEditor(); updateArmBanner(); }
function updateArmBanner() {
  const b = document.getElementById("armBanner");
  if (state.armedPin) {
    const p = findPin(state.armedPin);
    b.classList.add("show");
    document.getElementById("armText").textContent =
      p ? `Wiring from ${p.comp.label}·${p.pin.name} — click another pin (Esc to cancel)` : "";
  } else b.classList.remove("show");
}

// ---------- Add component ----------
function addComponent() {
  const center = toWorld(svg.getBoundingClientRect().left + svg.clientWidth * 0.4,
                         svg.getBoundingClientRect().top + svg.clientHeight * 0.4);
  const n = state.components.length + 1;
  const comp = {
    id: uid("c"), x: snap(center.x - 60), y: snap(center.y - 40),
    w: 120, h: 80, label: "Part " + n,
    pins: [
      { id: uid("pin"), name: "1", side: "left" },
      { id: uid("pin"), name: "2", side: "left" },
      { id: uid("pin"), name: "3", side: "right" },
      { id: uid("pin"), name: "4", side: "right" }
    ]
  };
  state.components.push(comp);
  state.selected = comp.id;
  renderAll();
}

// ---------- Pointer interaction ----------
let drag = null; // {type:'comp'|'pan', ...}

svg.addEventListener("pointerdown", (e) => {
  const pinEl = e.target.closest("[data-pin]");
  const wireEl = e.target.closest("[data-wire]");
  const bodyEl = e.target.closest("[data-body]");
  const noteEl = e.target.closest("[data-note-body]");

  if (noteEl) {
    const n = state.notes.find(x => x.id === noteEl.dataset.noteBody);
    state.selectedNote = n.id;
    state.selected = null;
    const w = toWorld(e.clientX, e.clientY);
    drag = { type: "note", id: n.id, dx: w.x - n.x, dy: w.y - n.y, moved: false };
    svg.setPointerCapture(e.pointerId);
    renderAll();
    return;
  }
  if (pinEl) {
    handlePinClick(pinEl.dataset.pin);
    e.preventDefault();
    return;
  }
  if (wireEl && !bodyEl) {
    // select-to-delete via confirm-less toggle: arm nothing, just remove on click? Better: select in list.
    // Clicking a wire cycles its selection highlight -> we simply delete via panel. Here: quick delete on shift.
    if (e.shiftKey) { deleteWire(wireEl.dataset.wire); return; }
  }
  if (bodyEl) {
    const c = state.components.find(c => c.id === bodyEl.dataset.body);
    state.selected = c.id;
    state.selectedNote = null;
    const w = toWorld(e.clientX, e.clientY);
    drag = { type: "comp", id: c.id, dx: w.x - c.x, dy: w.y - c.y, moved: false };
    svg.setPointerCapture(e.pointerId);
    renderPanel();
    return;
  }
  // empty space -> pan (and deselect)
  drag = { type: "pan", sx: e.clientX, sy: e.clientY, ox: state.view.x, oy: state.view.y, moved: false };
  svg.classList.add("panning");
  svg.setPointerCapture(e.pointerId);
});

svg.addEventListener("pointermove", (e) => {
  if (!drag) return;
  if (drag.type === "comp") {
    const w = toWorld(e.clientX, e.clientY);
    const c = state.components.find(c => c.id === drag.id);
    c.x = snap(w.x - drag.dx); c.y = snap(w.y - drag.dy);
    drag.moved = true;
    renderBoard();
  } else if (drag.type === "note") {
    const w = toWorld(e.clientX, e.clientY);
    const n = state.notes.find(x => x.id === drag.id);
    n.x = snap(w.x - drag.dx); n.y = snap(w.y - drag.dy);
    drag.moved = true;
    renderBoard();
  } else if (drag.type === "pan") {
    state.view.x = drag.ox + (e.clientX - drag.sx);
    state.view.y = drag.oy + (e.clientY - drag.sy);
    if (Math.abs(e.clientX - drag.sx) + Math.abs(e.clientY - drag.sy) > 3) drag.moved = true;
    applyView();
  }
});

svg.addEventListener("pointerup", (e) => {
  if (drag && drag.type === "pan" && !drag.moved) {
    // clicked empty -> deselect & disarm
    state.selected = null; state.selectedNote = null; state.armedPin = null; renderAll();
  }
  svg.classList.remove("panning");
  drag = null;
});

function handlePinClick(pinId) {
  if (state.armedPin === null) {
    state.armedPin = pinId;
  } else if (state.armedPin === pinId) {
    state.armedPin = null;
  } else {
    addWire(state.armedPin, pinId);
    state.armedPin = null;
  }
  renderAll();
}

// zoom
svg.addEventListener("wheel", (e) => {
  e.preventDefault();
  const r = svg.getBoundingClientRect();
  const sx = e.clientX - r.left, sy = e.clientY - r.top;
  const wx = (sx - state.view.x) / state.view.scale;
  const wy = (sy - state.view.y) / state.view.scale;
  const factor = e.deltaY < 0 ? 1.1 : 1 / 1.1;
  const ns = Math.min(3, Math.max(0.25, state.view.scale * factor));
  state.view.x = sx - wx * ns; state.view.y = sy - wy * ns;
  state.view.scale = ns;
  applyView();
}, { passive: false });

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") { closeReport(); closeLibrary(); state.armedPin = null; renderAll(); }
});

// ---------- Toolbar ----------
document.getElementById("addComp").onclick = addComponent;
document.getElementById("addNote").onclick = addNote;
document.getElementById("addLib").onclick = openLibrary;
document.getElementById("reportBtn").onclick = buildReport;
document.getElementById("zoomIn").onclick = () => zoomBy(1.2);
document.getElementById("zoomOut").onclick = () => zoomBy(1 / 1.2);
document.getElementById("zoomFit").onclick = fitView;
function zoomBy(f) {
  const r = svg.getBoundingClientRect();
  const cx = r.width / 2, cy = r.height / 2;
  const wx = (cx - state.view.x) / state.view.scale;
  const wy = (cy - state.view.y) / state.view.scale;
  const ns = Math.min(3, Math.max(0.25, state.view.scale * f));
  state.view.x = cx - wx * ns; state.view.y = cy - wy * ns; state.view.scale = ns;
  applyView();
}
function contentBounds() {
  const boxes = [];
  for (const c of state.components) boxes.push([c.x, c.y, c.x + c.w, c.y + c.h]);
  for (const n of state.notes) boxes.push([n.x, n.y, n.x + n.w, n.y + noteHeight(n) + NOTE_TAIL]);
  if (!boxes.length) return null;
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const b of boxes) {
    minX = Math.min(minX, b[0]); minY = Math.min(minY, b[1]);
    maxX = Math.max(maxX, b[2]); maxY = Math.max(maxY, b[3]);
  }
  return { minX, minY, maxX, maxY, w: maxX - minX, h: maxY - minY };
}
function fitView() {
  const b = contentBounds();
  if (!b) { state.view = { x: 220, y: 140, scale: 1 }; applyView(); return; }
  const pad = 80;
  const r = svg.getBoundingClientRect();
  const scale = Math.min(3, Math.max(0.25,
    Math.min(r.width / (b.w + pad * 2), r.height / (b.h + pad * 2))));
  state.view.scale = scale;
  state.view.x = (r.width - b.w * scale) / 2 - b.minX * scale;
  state.view.y = (r.height - b.h * scale) / 2 - b.minY * scale;
  applyView();
}

// save / load
document.getElementById("saveBtn").onclick = () => {
  const data = JSON.stringify({ components: state.components, wires: state.wires, notes: state.notes, seq: state.seq }, null, 2);
  const blob = new Blob([data], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "wiring-layout.json";
  a.click();
  URL.revokeObjectURL(a.href);
};
document.getElementById("loadBtn").onclick = () => document.getElementById("fileInput").click();
document.getElementById("fileInput").onchange = (e) => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const d = JSON.parse(reader.result);
      state.components = d.components || [];
      state.wires = d.wires || [];
      state.notes = d.notes || [];
      state.seq = d.seq || 1000;
      state.selected = null; state.selectedNote = null; state.armedPin = null;
      renderAll(); fitView();
    } catch (err) { alert("Could not read that file — is it a saved layout?"); }
  };
  reader.readAsText(file);
  e.target.value = "";
};
document.getElementById("clearBtn").onclick = () => {
  if (!state.components.length && !state.wires.length && !state.notes.length) return;
  if (confirm("Clear the whole board?")) {
    state.components = []; state.wires = []; state.notes = [];
    state.selected = null; state.selectedNote = null; state.armedPin = null;
    renderAll();
  }
};

// ---------- Blueprint report ----------
function esc(s) {
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}
function colorName(hex) {
  const m = WIRE_COLORS.find(c => c[1].toLowerCase() === String(hex).toLowerCase());
  return m ? m[0] : hex;
}

function buildReport() {
  const b = contentBounds();
  if (!b) { alert("Add some components before printing a blueprint."); return; }

  // Render once with nothing selected so no highlight chrome ends up on the sheet
  const keep = { sel: state.selected, note: state.selectedNote, arm: state.armedPin };
  state.selected = null; state.selectedNote = null; state.armedPin = null;
  renderBoard();
  const clone = world.cloneNode(true);
  state.selected = keep.sel; state.selectedNote = keep.note; state.armedPin = keep.arm;
  renderBoard();

  clone.removeAttribute("transform");
  const mat = clone.querySelector("#mat"); if (mat) mat.remove();
  clone.querySelectorAll("[data-pin]").forEach(el => el.remove());
  clone.querySelectorAll("#wireLayer path").forEach(p => { if (!p.dataset.wire) p.remove(); });

  const pad = 44;
  const vb = [b.minX - pad, b.minY - pad, b.w + pad * 2, b.h + pad * 2].join(" ");
  const drawing = '<svg class="dwg" viewBox="' + vb + '" xmlns="http://www.w3.org/2000/svg" ' +
                  'preserveAspectRatio="xMidYMid meet">' + clone.innerHTML + '</svg>';

  const rows = state.wires.map((w, i) => {
    const a = findPin(w.from), z = findPin(w.to);
    if (!a || !z) return "";
    return '<tr><td class="n">' + (i + 1) + '</td><td>' + esc(a.comp.label) + '</td>' +
           '<td class="pin">' + esc(a.pin.name) + '</td><td>' + esc(z.comp.label) + '</td>' +
           '<td class="pin">' + esc(z.pin.name) + '</td><td class="col">' +
           '<span class="sw" style="background:' + esc(w.color) + '"></span>' + esc(colorName(w.color)) +
           '</td></tr>';
  }).join("");

  const notes = state.notes.length
    ? '<ol class="notes">' + state.notes.map(n => '<li>' + esc(n.text) + '</li>').join("") + '</ol>'
    : '<p class="none">No notes on this drawing.</p>';

  const ver = (document.getElementById("verTag") || {}).textContent || "";
  const today = new Date().toISOString().slice(0, 10);

  const ver2 = ver, today2 = today;
  closeReport();

  const style = document.createElement("style");
  style.id = "reportStyle";
  style.textContent = REPORT_CSS;
  document.head.appendChild(style);

  const ov = document.createElement("div");
  ov.id = "reportOverlay";
  ov.innerHTML =
    '<div class="rbar">' +
      '<button data-print>Print / Save as PDF</button>' +
      '<button data-close class="sec">Close</button>' +
      '<span>Landscape is preset. Click the title-block fields to fill them in before printing.</span>' +
    '</div>' +
    '<div class="sheet"><div class="frame">' +
      '<div class="dwgwrap">' + drawing + '</div>' +
      '<div class="title">' +
        '<div class="grow"><span class="k">Project</span><span contenteditable>Untitled wiring diagram</span></div>' +
        '<div><span class="k">Drawn by</span><span contenteditable>&nbsp;</span></div>' +
        '<div><span class="k">Date</span>' + esc(today2) + '</div>' +
        '<div><span class="k">Rev</span><span contenteditable>A</span></div>' +
        '<div><span class="k">Parts</span>' + state.components.length + '</div>' +
        '<div><span class="k">Wires</span>' + state.wires.length + '</div>' +
        '<div><span class="k">Tool</span>TinkerTool ' + esc(ver2) + '</div>' +
      '</div>' +
      '<h2>Wire schedule</h2>' +
      (rows
        ? '<table><thead><tr><th></th><th>From</th><th>Pin</th><th>To</th><th>Pin</th><th>Color</th></tr></thead><tbody>' + rows + '</tbody></table>'
        : '<p class="none">No connections on this drawing.</p>') +
      '<h2>Notes</h2>' + notes +
    '</div></div>';

  document.body.appendChild(ov);
  ov.querySelector("[data-print]").onclick = () => window.print();
  ov.querySelector("[data-close]").onclick = closeReport;
}

function closeReport() {
  const o = document.getElementById("reportOverlay"); if (o) o.remove();
  const st = document.getElementById("reportStyle"); if (st) st.remove();
}

function partPins(p) {
  const pins = [];
  const add = (arr, side) => (arr || []).forEach(n => pins.push({ id: uid("pin"), name: n, side }));
  add(p.left, "left"); add(p.right, "right"); add(p.top, "top"); add(p.bottom, "bottom");
  return pins;
}
function spawnXY(w, h) {
  const r = svg.getBoundingClientRect();
  const c = toWorld(r.left + svg.clientWidth * 0.42, r.top + svg.clientHeight * 0.42);
  return { x: snap(c.x - w / 2), y: snap(c.y - h / 2) };
}
function addFromPart(p) {
  const sideMax = Math.max((p.left || []).length, (p.right || []).length, 1);
  const tbMax   = Math.max((p.top || []).length, (p.bottom || []).length, 0);
  const h = Math.max(70, sideMax * 24 + 26);
  const w = Math.max(p.w || 130, tbMax * 48 + 26);
  const pos = spawnXY(w, h);
  const comp = { id: uid("c"), x: pos.x, y: pos.y, w, h, label: p.name, pins: partPins(p) };
  state.components.push(comp);
  state.selected = comp.id;
  closeLibrary();
  renderAll();
}

let libEl = null;
function buildLibrary() {
  libEl = document.createElement("div");
  libEl.className = "lib-backdrop";
  const cats = [...new Set(PARTS.map(p => p.cat))];
  let html = '<div class="lib-modal"><div class="lib-head"><h3>Parts library</h3>' +
             '<button class="close" id="libX">✕</button></div><div class="lib-body">';
  for (const cat of cats) {
    html += `<div class="lib-cat">${cat}</div><div class="lib-grid">`;
    for (const p of PARTS.filter(p => p.cat === cat)) {
      const n = (p.left||[]).length + (p.right||[]).length + (p.top||[]).length + (p.bottom||[]).length;
      html += `<div class="lib-card" data-part="${p.name}"><div class="cn">${p.name}</div><div class="cd">${n} pins</div></div>`;
    }
    html += "</div>";
  }
  html += "</div></div>";
  libEl.innerHTML = html;
  document.body.appendChild(libEl);
  libEl.addEventListener("click", e => { if (e.target === libEl) closeLibrary(); });
  libEl.querySelector("#libX").onclick = closeLibrary;
  libEl.querySelectorAll(".lib-card").forEach(card => {
    card.onclick = () => { const p = PARTS.find(p => p.name === card.dataset.part); if (p) addFromPart(p); };
  });
}
function openLibrary() { if (!libEl) buildLibrary(); libEl.classList.add("show"); }
function closeLibrary() { if (libEl) libEl.classList.remove("show"); }
